name: Sync Project Boards

on:
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'Sync Type'
        required: true
        default: 'Regular'
        type: choice
        options:
          - Regular
          - Full
  # schedule:
  #   # Scheduled runs migrated to cron-job.org (Account: jayalathmegha@gmail.com) to avoid GitHub Actions cron drift.
  #   # ~11:00 AM, ~5:00 PM Asia/Colombo (UTC+5:30) on weekdays
  #   - cron: '13 5,11 * * 1-5'
  #   # ~5:30 AM Asia/Colombo (UTC+5:30) on Saturdays (Full Sync)
  #   - cron: '47 23 * * 5'

jobs:
  sync-boards:
    runs-on: ubuntu-latest
    env:
      TZ: "Asia/Colombo"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Use a Personal Access Token with org admin / project write permissions.
          token: ${{ secrets.GH_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Run Sync Script
        id: sync
        shell: pwsh
        run: |
          $syncArgs = @{}
          $isFullSync = $false
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            if ("${{ github.event.inputs.sync_type }}" -eq "Full") {
              $syncArgs["FullSync"] = $true
              $isFullSync = $true
            }
          } elseif ("${{ github.event_name }}" -eq "schedule") {
            # Saturday runs are Full Sync (check cron string for 100% reliability)
            if ("${{ github.event.schedule }}" -eq "47 23 * * 5") {
              $syncArgs["FullSync"] = $true
              $isFullSync = $true
            }
          }
          
          Write-Host "Executing sync with args: $($syncArgs.Keys -join ', ')"
          echo "is_full_sync=$($isFullSync.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          ./scripts/sync-boards/sync-boards.ps1 @syncArgs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Commit and Push Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only stage the changelog for regular syncs; FullSync logs to separate files
          if [ "${{ steps.sync.outputs.is_full_sync }}" != "true" ]; then
            git add changelogs/sync-boards.md
          else
            # Stage the full sync manifest and log for rollback and history
            git add changelogs/full-sync-manifest.json || true
            git add changelogs/full-sync.log || true
          fi
          git add scripts/sync-boards/sync-config.json
          git diff --staged --quiet || git commit -m "chore: auto-update board sync data"
          git restore .
          git pull --rebase origin main
          git push
